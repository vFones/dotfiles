# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "kanagawa_dragon"

# Starship modules
[character]
success_symbol = "[❯](dragon_orange)"
error_symbol = "[❯](autumn_red)"
vimcmd_symbol = "[❮](old_white)" # For use with zsh-vi-mode

[git_branch]
style = "bold spring_violet2"

[directory]
truncation_length = 4
style = "bold crystal_blue"

# Palette definitions
[palettes.kanagawa_dragon]
# Dragonblack shades (backgrounds)
dragon_black0 = "#0d0c0c"
dragon_black1 = "#12120f"
dragon_black2 = "#1D1C19"
dragon_black3 = "#181616"
dragon_black4 = "#282727"
dragon_black5 = "#393836"
dragon_black6 = "#625e5a"
# Dragon grays / whites
dragon_gray  = "#a6a69c"
dragon_gray2 = "#9e9b93"
dragon_gray3 = "#7a8382"
old_white    = "#c8c093"
# Bright/base colors
dragon_red     = "#c4746e"
dragon_green   = "#8a9a7b"
dragon_yellow  = "#c4b28a"
dragon_blue    = "#8ba4b0"
dragon_violet  = "#8992a7"
dragon_aqua    = "#8ea4a2"
dragon_orange  = "#b6927b"
dragon_gray_alt = "#a6a69c"
# Extended palette
autumn_green  = "#76946a"
autumn_red    = "#c34043"
autumn_yellow = "#dca561"
samurai_red   = "#e82424"
ronin_yellow  = "#ff9e3b"
wave_blue1    = "#223249"
wave_blue2    = "#2d4f67"
winter_green  = "#2b3328"
winter_yellow = "#49443c"
winter_red    = "#43242b"
winter_blue   = "#252535"
spring_green  = "#98bb6c"
